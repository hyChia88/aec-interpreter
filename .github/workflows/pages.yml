name: Deploy demo to GitHub Pages

# Publishes site/ (the 3D-grounding demo: viewer + cases.json + GLBs + site photos) to
# GitHub Pages via the official Pages-artifact deploy (no gh-pages branch needed). URL:
#   https://hychia88.github.io/aec-interpreter/demo.html
#
# LIVE backend: the page is static, but demo.html POSTs to the Modal web app
# (deploy/modal_app.py) when its MODAL_URL const is set and the host is *.github.io — so
# both the Free-input and Held-out "Run live inference" paths work online. With MODAL_URL
# left as the REPLACE-ME placeholder, the /health probe fails and the page degrades to the
# cached realized result for the 60 held-out cases. See deploy/README.md for the backend.
#
# ONE-TIME SETUP (repo owner, in the GitHub UI):
#   Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
# After that this runs on every push that touches site/.

on:
  push:
    branches: [main, master]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
