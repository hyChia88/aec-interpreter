name: Deploy demo to GitHub Pages

# Publishes site/ (the static 3D-grounding demo: viewer + cases.json + GLBs + site
# photos) to GitHub Pages. The hosted page is fully static — it shows the *cached*
# realized neuro-symbolic result for all 60 held-out cases (no Modal/Neo4j backend).
# The live "Run inference" button only appears in the local uvicorn build.
#
# ONE-TIME SETUP (repo owner, in the GitHub UI):
#   Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
# After that this runs on every push that touches site/. URL:
#   https://<user>.github.io/aec-interpreter/

on:
  push:
    branches: [main, master]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
